<body>

<header>
    <h1>Victor Likome Dafuleni</h1>
    <p>Real Blog System (No Coding Needed to Add Posts)</p>
</header>

<nav>
    <a href="#">Home</a>
</nav>

<main>

    <!-- POST FORM -->
    <section class="form-box">
        <h2>Add New Post</h2>

        <input type="text" id="title" placeholder="Post Title">
        <textarea id="content" placeholder="Write your post..."></textarea>

        <button onclick="addPost()">Publish Post</button>
    </section>

    <!-- POSTS WILL APPEAR HERE -->
    <section id="posts"></section>

</main>
